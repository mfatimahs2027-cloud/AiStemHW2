<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – Animals from Land, Mountains and the Sea</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="container header-inner">
      <div class="logo">
        <a href="index.html">Animals from Land, Mountains and the Sea</a>
      </div>
      <nav class="main-nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>

    <!-- PAGE TITLE SECTION -->
    <section class="page-title section">
      <div class="container">
        <h1>Contact</h1>
        <p>Have a question or want to reach out? Send a message below.</p>
      </div>
    </section>

    <!-- CONTACT FORM SECTION -->
    <section class="contact-section section">
      <div class="container">
        <form class="contact-form">

          <div class="form-group">
            <label for="name">Name:</label>
            <input id="name" type="text" name="name" placeholder="Your Name">
          </div>

          <div class="form-group">
            <label for="email">Email:</label>
            <input id="email" type="email" name="email" placeholder="Your Email">
          </div>

          <div class="form-group">
            <label for="subject">Subject:</label>
            <input id="subject" type="text" name="subject" placeholder="What's the subject?">
          </div>

          <div class="form-group">
            <label for="message">Message:</label>
            <textarea id="message" name="message" placeholder="Your message"></textarea>
          </div>

          <button type="submit">Submit</button>

        </form>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Animals from Land, Mountains and the Sea. By Mahnoor Fatima All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
